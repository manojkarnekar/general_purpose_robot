# This config file is used by ros2_control
controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    arm_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController


    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

arm_trajectory_controller:
  ros__parameters:
    joints:
      - torso_joint
      - motor1_joint
      - motor2_joint
      - motor3_joint
      - motor5_joint
      - motor6_joint
      - motor7_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity